services:
  # service name. Compose will create a container with this name
  app:
    image: serversideup/php:8.1-fpm-nginx
    container_name: laravel_app
    #  mounts the current directory to /var/www/html inside the container
    volumes:
      - .:/var/www/html
      # HOST PORT:CONTAINER PORT
    ports:
      - "8081:80"
      # environment variables
    environment:
      - DOCROOT=/var/www/html/public
      - SSL_MODE=off
      - NGINX_LISTEN_PORT=80
      - NGINX_HTTP_PORT=80
    depends_on:
      - db
    networks:
      - laravel

  db:
    image: postgres:15
    container_name: laravel_db
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
      # db data is saved outside the container, inside this directory
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - laravel

volumes:
  db_data:

networks:
  laravel:
